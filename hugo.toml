# 用户页模式部署到 GitHub Pages
baseURL = "https://VimatinD.github.io/"
defaultContentLanguage = "zh-cn"
title = "我的博客"
# 中文必须加这一行，Hugo 才能正确处理中日韩文字间距
hasCJKLanguage = true

# Hugo Module 配置
[module]
  [[module.imports]]
    # ⚠️ 注意：Toha 仓库 GitHub URL 是 hugo-themes/toha，
    # 但 module path 用的是旧的组织名 hugo-toha/toha/v4（go.mod 里声明的）
    path = "github.com/hugo-toha/toha/v4"

  # 把 node_modules 里的字体/图标挂到 Hugo 的 static 目录
  [[module.mounts]]
    source = "static/files"
    target = "static/files"
  [[module.mounts]]
    source = "./node_modules/flag-icons/flags"
    target = "static/flags"
  [[module.mounts]]
    source = "./node_modules/@fontsource/mulish/files"
    target = "static/files"
  [[module.mounts]]
    source = "./node_modules/katex/dist/fonts"
    target = "static/fonts"

# 语言配置（纯中文方案）
[languages]
  [languages.zh-cn]
    label = "简体中文"
    weight = 1

# Markdown 配置
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

# 站点参数
[params]
  background = "/images/site/background.jpg"
  [params.logo]
    main = "/images/site/main-logo.png"
    inverted = "/images/site/inverted-logo.png"
    favicon = "/images/site/favicon.png"

  [params.features]
    [params.features.theme]
      enable = true
      services = { light = true, dark = true, default = "system" }
    [params.features.blog]
      enable = true
      showAuthor = true
    [params.features.toc]
      enable = true
    [params.features.tags]
      enable = true
      on_card = true
    # 启用数学公式（katex shortcode 才会有）
    [params.features.math]
      enable = true
      [params.features.math.services.katex]
        # delimiters 是数组表，直接 [[...]] 写，不要先 [params...delimiters] 声明成普通表
        [[params.features.math.services.katex.delimiters]]
          left = "$$"
          right = "$$"
          display = true
        [[params.features.math.services.katex.delimiters]]
          left = "\\("
          right = "\\)"
          display = false
    # 启用 Mermaid 流程图
    [params.features.flowchart]
      enable = true
      [params.features.flowchart.services.mermaid]
        theme = "default"

  [params.footer]
    enable = true
    [params.footer.navigation]
      enable = true
    [params.footer.contactMe]
      enable = true